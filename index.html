<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B3N'$ M0DE1 M@KER</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1e1e1e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            cursor: none;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 240px;
            max-height: 85vh;
            overflow-y: auto;
            z-index: 10;
            cursor: default;
        }
        h3 { margin-top: 0; margin-bottom: 5px; font-size: 16px; color: #00ffff; }
        .section-title { font-size: 11px; text-transform: uppercase; color: #888; margin: 15px 0 5px 0; letter-spacing: 1px; }
        
        .shape-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        
        button {
            display: block;
            width: 100%;
            background: #333;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }
        button:hover { background: #444; border-color: #00ffff; }
        .shape-grid button { margin-bottom: 0; padding: 6px; font-weight: normal; }
        .tool-btn { background: #252525; }
        .tool-btn.active { background: #00ffff; color: #000; border-color: #00ffff; }
        
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        input[type="color"] {
            border: none;
            width: 40px;
            height: 30px;
            cursor: pointer;
            background: transparent;
        }

        input[type="text"] {
            width: calc(100% - 16px);
            background: #111;
            border: 1px solid #444;
            padding: 6px 8px;
            border-radius: 6px;
            color: white;
            margin-bottom: 8px;
            font-size: 13px;
        }
        input[type="text"]:focus { outline: none; border-color: #00ffff; }
        
        .file-input-label {
            display: block;
            text-align: center;
            background: #2b3a4a;
            border: 1px solid #3b5a7a;
            color: #88c0d0;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 6px;
        }
        .file-input-label:hover { border-color: #00ffff; }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #aaa;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            text-align: center;
            z-index: 10;
            width: max-content;
        }
        kbd { background: #444; color: white; padding: 2px 6px; border-radius: 4px; font-family: monospace; }

        #custom-cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border: 2px solid #00ffff;
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.1s, height 0.1s, background-color 0.1s;
        }
        body:active #custom-cursor { width: 6px; height: 6px; background-color: #00ffff; }

        #select-box {
            border: 1px dashed #00ffff;
            background: rgba(0, 255, 255, 0.15);
            position: absolute;
            pointer-events: none;
            z-index: 5;
            display: none;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/GLTFExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="select-box"></div>

    <div id="ui-container">
        <h3>B3N'$ M0DE1 M@KER</h3>
        
        <div class="section-title">Add Primitive Shapes</div>
        <div class="shape-grid">
            <button onclick="addShape('cube')">Cube</button>
            <button onclick="addShape('sphere')">Sphere</button>
            <button onclick="addShape('cylinder')">Cylinder</button>
            <button onclick="addShape('cone')">Cone</button>
            <button onclick="addShape('torus')">Torus (Donut)</button>
            <button onclick="addShape('capsule')">Capsule</button>
            <button onclick="addShape('knot')">Torus Knot</button>
            <button onclick="addShape('dodecahedron')">Dodecahedron</button>
            <button onclick="addShape('octahedron')">Octahedron</button>
            <button onclick="addShape('icosahedron')">Icosahedron</button>
            <button onclick="addShape('tetrahedron')">Tetrahedron</button>
            <button onclick="addShape('ring')">Ring Plane</button>
        </div>

        <div class="section-title">Transform Tools</div>
        <button id="tool-translate" class="tool-btn active" onclick="setTool('translate')">Move (W)</button>
        <button id="tool-rotate" class="tool-btn" onclick="setTool('rotate')">Rotate (E)</button>
        <button id="tool-scale" class="tool-btn" onclick="setTool('scale')">Scale (R)</button>
        
        <div class="section-title">Paint Property</div>
        <div class="color-picker-wrapper">
            <input type="color" id="shape-color" value="#00ff88">
            <span style="font-size: 12px;">Object Color</span>
        </div>

        <div class="section-title">Import 3D / Files</div>
        <label class="file-input-label" for="file-import">📂 Import (.gltf, .glb, .b3n)</label>
        <input type="file" id="file-import" accept=".gltf,.glb,.json,.b3n" style="display:none;" onchange="handleFileImport(event)">

        <div class="section-title">Export / Save Actions</div>
        <label style="font-size: 11px; color:#aaa; display:block; margin-bottom:4px;">Project Name</label>
        <input type="text" id="file-name" value="my_3d_scene">
        
        <button onclick="bundleAndDownloadZip()" style="background: #224422; border-color: #22aa22; color: #aaffaa; margin-bottom: 4px;">↓ Download Project ZIP</button>
        <button onclick="deleteSelected()" style="color: #ff5555; border-color: #552222; font-size: 11px; margin-top:10px;">Delete Selected</button>
    </div>

    <div id="instructions">
        Drag Box to Multi-Select | Hold <kbd>Shift</kbd> + Click to Add | <kbd>W</kbd> <kbd>E</kbd> <kbd>R</kbd> Tools | <kbd>Arrows</kbd> Orbit | <kbd>Shift+Arrows</kbd> Pan
    </div>

    <script>
        const customCursor = document.getElementById('custom-cursor');
        const uiContainer = document.getElementById('ui-container');
        const selectBoxElement = document.getElementById('select-box');
        
        let cursorX = window.innerWidth / 2;
        let cursorY = window.innerHeight / 2;

        function updateCursorVisual(x, y) {
            cursorX = x;
            cursorY = y;
            customCursor.style.left = cursorX + 'px';
            customCursor.style.top = cursorY + 'px';
        }
        updateCursorVisual(cursorX, cursorY);

        window.addEventListener('mousemove', (e) => {
            if (!(e.clientX < 280 && e.clientY < window.innerHeight * 0.9)) {
                updateCursorVisual(e.clientX, e.clientY);
            }
        });

        uiContainer.addEventListener('mouseenter', () => { customCursor.style.display = 'none'; });
        uiContainer.addEventListener('mouseleave', () => { customCursor.style.display = 'block'; });

        // 1. Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e1e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 6, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00ffff, 0x444444);
        scene.add(gridHelper);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // 2. Control Interactivity Setup
        const orbit = new THREE.OrbitControls(camera, renderer.domElement);
        orbit.enableDamping = true;
        orbit.target.set(0, 1, 0);
        orbit.mouseButtons = { LEFT: THREE.MOUSE.NONE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

        const transformGizmo = new THREE.TransformControls(camera, renderer.domElement);
        scene.add(transformGizmo);

        transformGizmo.addEventListener('change', () => renderer.render(scene, camera));
        transformGizmo.addEventListener('dragging-changed', (event) => {
            orbit.enabled = !event.value;
        });

        orbit.addEventListener('change', () => {
            if (orbit.enabled === true) {
                updateCursorVisual(window.innerWidth / 2, window.innerHeight / 2);
            }
        });

        // 3. Multi-Selection Tracking & Opacity Engine
        const selectableObjects = [];
        let selectedObjects = []; // Converted to array for tracking multiple items
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const colorPicker = document.getElementById('shape-color');

        let isDraggingSelection = false;
        let dragStartPos = { x: 0, y: 0 };
        let isShiftDown = false;

        window.addEventListener('keydown', (e) => { if(e.key === 'Shift') isShiftDown = true; });
        window.addEventListener('keyup', (e) => { if(e.key === 'Shift') isShiftDown = false; });

        window.addEventListener('pointerdown', (e) => {
            if (e.clientX < 280 && e.clientY < window.innerHeight * 0.9) return; 
            if (e.button !== 0) return; 
            if (transformGizmo.dragging) return;

            isDraggingSelection = true;
            dragStartPos.x = e.clientX;
            dragStartPos.y = e.clientY;

            selectBoxElement.style.left = e.clientX + 'px';
            selectBoxElement.style.top = e.clientY + 'px';
            selectBoxElement.style.width = '0px';
            selectBoxElement.style.height = '0px';
            selectBoxElement.style.display = 'block';
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingSelection) return;
            const currentX = e.clientX;
            const currentY = e.clientY;

            selectBoxElement.style.left = Math.min(dragStartPos.x, currentX) + 'px';
            selectBoxElement.style.top = Math.min(dragStartPos.y, currentY) + 'px';
            selectBoxElement.style.width = Math.abs(dragStartPos.x - currentX) + 'px';
            selectBoxElement.style.height = Math.abs(dragStartPos.y - currentY) + 'px';
        });

        window.addEventListener('pointerup', (e) => {
            if (!isDraggingSelection) return;
            isDraggingSelection = false;
            selectBoxElement.style.display = 'none';

            const boxWidth = Math.abs(dragStartPos.x - e.clientX);
            const boxHeight = Math.abs(dragStartPos.y - e.clientY);

            if (boxWidth < 6 && boxHeight < 6) {
                targetSelectionRay(e.clientX, e.clientY, isShiftDown);
                return;
            }

            if (!isShiftDown) selectedObjects = [];

            const xMin = Math.min(dragStartPos.x, e.clientX);
            const xMax = Math.max(dragStartPos.x, e.clientX);
            const yMin = Math.min(dragStartPos.y, e.clientY);
            const yMax = Math.max(dragStartPos.y, e.clientY);

            selectableObjects.forEach(obj => {
                const screenPos = getScreenCoords(obj);
                if (screenPos.x >= xMin && screenPos.x <= xMax && screenPos.y >= yMin && screenPos.y <= yMax) {
                    if (!selectedObjects.includes(obj)) selectedObjects.push(obj);
                }
            });

            applySelectionVisuals();
        });

        function targetSelectionRay(clientX, clientY, appendMode) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(selectableObjects, true);

            if (!appendMode) selectedObjects = [];

            if (intersects.length > 0) {
                let rootObj = intersects[0].object;
                while (rootObj.parent && rootObj.parent !== scene) {
                    rootObj = rootObj.parent;
                }
                
                if (appendMode && selectedObjects.includes(rootObj)) {
                    selectedObjects = selectedObjects.filter(item => item !== rootObj);
                } else {
                    if (!selectedObjects.includes(rootObj)) selectedObjects.push(rootObj);
                }
            }
            applySelectionVisuals();
        }

        // Handles attaching gizmos and modifying environmental opacity configurations
        function applySelectionVisuals() {
            transformGizmo.detach();
            
            if (selectedObjects.length > 0) {
                // Attach transform handles directly onto the most recently selected item
                transformGizmo.attach(selectedObjects[selectedObjects.length - 1]);
                
                const lead = selectedObjects[0];
                if (lead.material && lead.material.color) {
                    colorPicker.value = '#' + lead.material.color.getHexString();
                }
            }

            // Update workspace fade opacities
            selectableObjects.forEach(obj => {
                const isSelected = selectedObjects.includes(obj);
                obj.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.transparent = true;
                        // Keep selections fully solid, drop environmental objects to 25% visibility
                        child.material.opacity = (selectedObjects.length === 0 || isSelected) ? 1.0 : 0.25;
                    }
                });
            });
        }

        function getScreenCoords(object) {
            const vector = new THREE.Vector3();
            object.updateMatrixWorld();
            vector.setFromMatrixPosition(object.matrixWorld);
            vector.project(camera);
            return {
                x: (vector.x * .5 + .5) * window.innerWidth,
                y: (-(vector.y * .5) + .5) * window.innerHeight
            };
        }

        function addShape(type) {
            let geometry;
            if (type === 'cube') { geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2); geometry.translate(0, 0.6, 0); } 
            else if (type === 'sphere') { geometry = new THREE.SphereGeometry(0.7, 32, 32); geometry.translate(0, 0.7, 0); } 
            else if (type === 'cylinder') { geometry = new THREE.CylinderGeometry(0.5, 0.5, 1.4, 32); geometry.translate(0, 0.7, 0); }
            else if (type === 'cone') { geometry = new THREE.ConeGeometry(0.6, 1.4, 32); geometry.translate(0, 0.7, 0); }
            else if (type === 'torus') { geometry = new THREE.TorusGeometry(0.5, 0.2, 16, 100); geometry.translate(0, 0.7, 0); }
            else if (type === 'capsule') { geometry = new THREE.CapsuleGeometry(0.4, 0.8, 8, 16); geometry.translate(0, 0.8, 0); }
            else if (type === 'knot') { geometry = new THREE.TorusKnotGeometry(0.4, 0.12, 64, 8); geometry.translate(0, 0.6, 0); }
            else if (type === 'dodecahedron') { geometry = new THREE.DodecahedronGeometry(0.7); geometry.translate(0, 0.7, 0); }
            else if (type === 'octahedron') { geometry = new THREE.OctahedronGeometry(0.7); geometry.translate(0, 0.7, 0); }
            else if (type === 'icosahedron') { geometry = new THREE.IcosahedronGeometry(0.7); geometry.translate(0, 0.7, 0); }
            else if (type === 'tetrahedron') { geometry = new THREE.TetrahedronGeometry(0.7); geometry.translate(0, 0.6, 0); }
            else if (type === 'ring') { geometry = new THREE.RingGeometry(0.3, 0.8, 32); geometry.translate(0, 0.1, 0); geometry.rotateX(-Math.PI / 2); }

            const material = new THREE.MeshStandardMaterial({ 
                color: new THREE.Color(colorPicker.value),
                roughness: 0.4,
                metalness: 0.1
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData.shapeType = type; 
            mesh.position.set((Math.random() - 0.5) * 4, 0, (Math.random() - 0.5) * 4);
            
            scene.add(mesh);
            selectableObjects.push(mesh);
            
            selectedObjects = [mesh];
            applySelectionVisuals();
        }

        colorPicker.addEventListener('input', (e) => {
            selectedObjects.forEach(obj => {
                obj.traverse(child => {
                    if(child.isMesh && child.material) child.material.color.set(e.target.value);
                });
            });
        });

        function setTool(mode) {
            transformGizmo.setMode(mode);
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tool-${mode}`).classList.add('active');
        }

        function deleteSelected() {
            transformGizmo.detach();
            selectedObjects.forEach(obj => {
                scene.remove(obj);
                const index = selectableObjects.indexOf(obj);
                if (index > -1) selectableObjects.splice(index, 1);
            });
            selectedObjects = [];
            applySelectionVisuals();
        }

        // 4. File Imports Management
        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const filename = file.name.toLowerCase();
            const reader = new FileReader();

            if (filename.endsWith('.json') || filename.endsWith('.b3n')) {
                reader.onload = function(e) {
                    try {
                        const projectData = JSON.parse(e.target.result);
                        transformGizmo.detach();
                        selectableObjects.forEach(obj => scene.remove(obj));
                        selectableObjects.length = 0;
                        selectedObjects = [];

                        projectData.forEach(data => {
                            addShape(data.type);
                            const current = selectedObjects[0];
                            current.position.fromArray(data.position);
                            current.rotation.fromArray(data.rotation);
                            current.scale.fromArray(data.scale);
                            current.material.color.set(data.color);
                        });
                        selectedObjects = [];
                        applySelectionVisuals();
                    } catch(err) { alert("Invalid .B3N Project File Structure"); }
                };
                reader.readAsText(file);
            } 
            else if (filename.endsWith('.gltf') || filename.endsWith('.glb')) {
                reader.onload = function(e) {
                    const contents = e.target.result;
                    const loader = new THREE.GLTFLoader();
                    loader.parse(contents, '', function(gltf) {
                        const importedScene = gltf.scene;
                        importedScene.position.set(0,0,0);
                        scene.add(importedScene);
                        selectableObjects.push(importedScene);
                        selectedObjects = [importedScene];
                        applySelectionVisuals();
                    }, function(error){ alert("Error Parsing GLTF file structure"); });
                };
                reader.readAsArrayBuffer(file);
            }
        }

        function bundleAndDownloadZip() {
            transformGizmo.detach();
            const zip = new JSZip();
            const filename = getFileName();

            const b3nData = [];
            selectableObjects.forEach(obj => {
                if(obj.userData.shapeType) { 
                    b3nData.push({
                        type: obj.userData.shapeType,
                        position: obj.position.toArray(),
                        rotation: obj.rotation.toArray(),
                        scale: obj.scale.toArray(),
                        color: '#' + obj.material.color.getHexString()
                    });
                }
            });
            zip.file(`${filename}.b3n`, JSON.stringify(b3nData, null, 2));

            const readmeText = `========================================================================\n B3N'$ M0DE1 M@KER - PROJECT OVERVIEW\n========================================================================\n\nProject Name: ${filename}`;
            zip.file("README.txt", readmeText);

            const exporter = new THREE.GLTFExporter();
            const exportTarget = new THREE.Group();
            selectableObjects.forEach(obj => exportTarget.add(obj.clone()));

            exporter.parse(exportTarget, function (gltf) {
                zip.file(`${filename}.gltf`, JSON.stringify(gltf, null, 2));
                zip.generateAsync({type:"blob"}).then(function(content) {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(content);
                    link.download = `${filename}_project.zip`;
                    link.click();
                    applySelectionVisuals();
                });
            }, function(error){ 
                console.error(error); 
                applySelectionVisuals();
            });
        }

        function getFileName() {
            let name = document.getElementById('file-name').value.trim();
            return name ? name : 'my_3d_scene';
        }

        // 5. Keyboard Navigation Engine
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return; 

            const panSpeed = 0.25;
            const rotateSpeed = 0.08;

            switch (e.key) {
                case 'Enter':
                    targetSelectionRay(cursorX, cursorY, isShiftDown);
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    if (e.shiftKey) orbit.pan(0, panSpeed);
                    else orbit.target.y += 0.1;
                    orbit.update();
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    if (e.shiftKey) orbit.pan(0, -panSpeed);
                    else orbit.target.y -= 0.1;
                    orbit.update();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (e.shiftKey) orbit.pan(-panSpeed, 0);
                    else orbit.rotateLeft(rotateSpeed);
                    orbit.update();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (e.shiftKey) orbit.pan(panSpeed, 0);
                    else orbit.rotateLeft(-rotateSpeed);
                    orbit.update();
                    break;

                case 'w': case 'W': setTool('translate'); break;
                case 'e': case 'E': setTool('rotate'); break;
                case 'r': case 'R': setTool('scale'); break;
                case 'delete': case 'Backspace': deleteSelected(); break;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            orbit.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        addShape('cube');
        animate();
    </script>
</body>
</html>
